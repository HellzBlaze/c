<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallNotify - GitHub Call Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div id="app" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">CallNotify</h1>
        
        <div id="setup-view">
            <p class="text-gray-600 mb-6">Enter a Room ID to connect devices.</p>
            <input type="text" id="room-id" placeholder="Room ID (e.g. my-home)" 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setupDevice('caller')" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition">
                    Be Caller
                </button>
                <button onclick="setupDevice('receiver')" 
                    class="bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition">
                    Be Receiver
                </button>
            </div>
            <p class="mt-4 text-xs text-gray-400">Note: You need to provide your own Firebase config in app.js for this to work.</p>
        </div>

        <div id="caller-view" class="hidden">
            <div class="mb-8">
                <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium">Caller Mode</span>
                <p id="caller-room-display" class="mt-2 text-gray-500 font-mono"></p>
            </div>
            <button id="call-btn" onclick="triggerCall()" 
                class="w-48 h-48 bg-red-500 hover:bg-red-600 text-white rounded-full shadow-lg hover:shadow-2xl transform active:scale-95 transition-all flex flex-col items-center justify-center mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z" />
                </svg>
                <span class="text-xl font-bold uppercase tracking-widest">Call</span>
            </button>
            <p id="status-msg" class="mt-6 text-gray-400 italic">Ready to call</p>
            <button onclick="resetView()" class="mt-8 text-gray-400 hover:text-gray-600 text-sm underline">Change Room/Role</button>
        </div>

        <div id="receiver-view" class="hidden">
            <div class="mb-8">
                <span class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-medium">Receiver Mode</span>
                <p id="receiver-room-display" class="mt-2 text-gray-500 font-mono"></p>
            </div>
            <div class="animate-pulse bg-green-50 p-6 rounded-xl border border-green-200">
                <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </div>
                <p class="text-green-800 font-semibold">Waiting for Calls...</p>
                <p class="text-xs text-green-600 mt-2">Keep this page open or in background.</p>
            </div>
            <button onclick="resetView()" class="mt-8 text-gray-400 hover:text-gray-600 text-sm underline">Change Room/Role</button>
        </div>
    </div>

    <!-- Hidden audio element for foreground alerts -->
    <audio id="alarm-sound" src="alarm.mp3" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
