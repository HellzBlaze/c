<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallNotify - Dark Mode P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4">
    <div id="app" class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border border-gray-800">
        <h1 class="text-3xl font-bold text-white mb-6 tracking-tight">CallNotify</h1>
        
        <div id="setup-view">
            <p class="text-gray-400 mb-6">Connect devices using a shared ID.</p>
            <input type="text" id="peer-id-input" placeholder="Enter a unique ID (e.g. home-call)" 
                class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg mb-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="initPeer('caller')" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition-all active:scale-95">
                    Be Caller
                </button>
                <button onclick="initPeer('receiver')" 
                    class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-lg transition-all active:scale-95">
                    Be Receiver
                </button>
            </div>
            <p id="init-status" class="mt-4 text-xs text-gray-500"></p>
        </div>

        <div id="caller-view" class="hidden">
            <div class="mb-8">
                <span class="px-3 py-1 bg-indigo-900/50 text-indigo-300 border border-indigo-500/30 rounded-full text-sm font-medium">Caller Mode</span>
                <p id="caller-id-display" class="mt-2 text-gray-500 font-mono text-sm"></p>
            </div>
            <button id="call-btn" onclick="triggerCall()" 
                class="w-48 h-48 bg-rose-600 hover:bg-rose-700 text-white rounded-full shadow-lg hover:shadow-rose-900/40 transform active:scale-95 transition-all flex flex-col items-center justify-center mx-auto border-4 border-rose-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z" />
                </svg>
                <span class="text-xl font-bold uppercase tracking-widest">Call</span>
            </button>
            <p id="status-msg" class="mt-6 text-gray-500 italic">Ready to connect</p>
            <button onclick="location.reload()" class="mt-8 text-gray-600 hover:text-gray-400 text-sm underline">Reset Connection</button>
        </div>

        <div id="receiver-view" class="hidden">
            <div class="mb-8">
                <span class="px-3 py-1 bg-emerald-900/50 text-emerald-300 border border-emerald-500/30 rounded-full text-sm font-medium">Receiver Mode</span>
                <p id="receiver-id-display" class="mt-2 text-gray-500 font-mono text-sm"></p>
            </div>
            <div class="animate-pulse bg-emerald-900/20 p-6 rounded-xl border border-emerald-500/20">
                <div class="w-16 h-16 bg-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </div>
                <p class="text-emerald-400 font-semibold">Waiting for Calls...</p>
                <p class="text-xs text-emerald-600 mt-2">Keep this tab active or in background.</p>
            </div>
            <button onclick="location.reload()" class="mt-8 text-gray-600 hover:text-gray-400 text-sm underline">Reset Connection</button>
        </div>
    </div>

    <audio id="alarm-sound" src="alarm.mp3" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
